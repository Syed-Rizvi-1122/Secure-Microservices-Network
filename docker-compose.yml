version: "3"

services:
  apisix-dashboard:
    image: apache/apisix-dashboard:latest
    restart: always
    volumes:
      - ./dashboard_conf/conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml
    ports:
      - "9000:9000"
    networks:
      - apisix

  apisix:
    image: apache/apisix:${APISIX_IMAGE_TAG:-latest}
    restart: always
    volumes:
      - ./apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./certs:/certs:ro
    depends_on:
      - etcd
      - users
      - products
      - orders
      - auth
      - prometheus
      - grafana
    ports:
      - "9180:9180"
      - "9080:9080"
      - "9091:9091"
      - "9443:9443"
      - "9092:9092"
    networks:
      - apisix

  etcd:
    image: quay.io/coreos/etcd:v3.4.15
    restart: always
    volumes:
      - etcd_data:/bitnami/etcd
    environment:
      ETCD_ENABLE_V2: "true"
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:7000"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:7000"
    ports:
      - "7000:7000"
    networks:
      - apisix

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - apisix

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - apisix

  users:
    build:
      context: .
      dockerfile: flask/users/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/ecommerce
      SERVICE_NAME: users
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      IDS_WINDOW: "60"
      IDS_THRESHOLD: "80"
      IDS_BLOCK_AT: "120"
      APISIX_ADMIN_URL: http://apisix:9180
      APISIX_API_KEY: edd1c9f034335f136f87ad84b625c8f1
    ports:
      - "5001:5000"
    depends_on:
      - db
      - redis
    volumes:
      - ./certs:/certs:ro
      - ./ids:/ids:ro
    networks:
      - apisix

  products:
    build:
      context: .
      dockerfile: flask/products/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/ecommerce
      SERVICE_NAME: products
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      IDS_WINDOW: "60"
      IDS_THRESHOLD: "80"
      IDS_BLOCK_AT: "120"
      APISIX_ADMIN_URL: http://apisix:9180
      APISIX_API_KEY: edd1c9f034335f136f87ad84b625c8f1
    ports:
      - "5002:5000"
    depends_on:
      - db
      - redis
    volumes:
      - ./certs:/certs:ro
      - ./ids:/ids:ro
    networks:
      - apisix

  orders:
    build:
      context: .
      dockerfile: flask/orders/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/ecommerce
      SERVICE_NAME: orders
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      IDS_WINDOW: "60"
      IDS_THRESHOLD: "80"
      IDS_BLOCK_AT: "120"
      APISIX_ADMIN_URL: http://apisix:9180
      APISIX_API_KEY: edd1c9f034335f136f87ad84b625c8f1
    ports:
      - "5003:5000"
    depends_on:
      - db
      - redis
    volumes:
      - ./certs:/certs:ro
      - ./ids:/ids:ro
    networks:
      - apisix

  auth:
    build:
      context: .
      dockerfile: flask/auth/Dockerfile
    restart: always
    environment:
      JWT_SECRET: nps-project-secret-2026
      TOKEN_TTL_SECONDS: "3600"
      SERVICE_NAME: auth
    ports:
      - "5004:5000"
    volumes:
      - ./certs:/certs:ro
    networks:
      - apisix

  prometheus:
    image: prom/prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
      - ./certs:/certs:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - apisix

  grafana:
    image: grafana/grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - apisix


networks:
  apisix:
    driver: bridge

volumes:
  etcd_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
